name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Run shellcheck
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y shellcheck
          shellcheck install.sh bin/determinagents

  markdown-links:
    name: markdown link check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Check links
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: 'yes'
          use-verbose-mode: 'no'
          config-file: '.github/markdown-link-check.json'

  install-test:
    name: install end-to-end (clean Ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Build and run install test
        run: |
          docker build -f tests/Dockerfile.install -t det-install-test .
          docker run --rm det-install-test

  shell-syntax:
    name: shell syntax (sh -n)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - run: sh -n install.sh
      - run: sh -n bin/determinagents
